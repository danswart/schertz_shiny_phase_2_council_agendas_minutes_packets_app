name: Schertz weekly refresh

on:
  schedule:
    - cron: "10 6 * * 0"
      timezone: "America/Chicago"
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install Linux system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libpoppler-cpp-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c(
            "rsconnect",
            "httr2", "rvest", "xml2", "dplyr", "purrr", "readr",
            "stringr", "tibble", "tidyr", "lubridate", "pdftools",
            "jsonlite", "shiny", "bslib", "DT"
          ), repos = "https://cloud.r-project.org")'

      - name: Run weekly refresh
        env:
          SCHERTZ_START_YEAR: "2019"
          SCHERTZ_INCLUDE_ARCHIVE: "false"
        run: |
          Rscript scripts/update_data.R

      - name: Update manifest for deployment
        run: |
          Rscript -e 'rsconnect::writeManifest(
            appDir = "deploy_app",
            appFiles = c(
              "app.R",
              "R/00_config.R",
              "data/derived/documents.rds",
              "data/derived/refresh_metadata.csv"
            ),
            appMode = "shiny",
            appPrimaryDoc = "app.R"
          )'

      - name: Commit and push refreshed results
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add -f deploy_app/data/derived/documents.rds || true
          git add -f deploy_app/data/derived/refresh_metadata.csv || true
          git add -f deploy_app/data/derived/refresh_comparison_summary.csv || true
          git add -f deploy_app/data/derived/refresh_comparison_details.csv || true
          git add deploy_app/manifest.json || true

          git diff --staged --quiet || git commit -m "Weekly refresh - $(date +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Upload refresh artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schertz-refresh-artifacts
          path: |
            deploy_app/data/derived/documents.rds
            deploy_app/data/derived/refresh_metadata.csv
            deploy_app/data/derived/refresh_comparison_summary.csv
            deploy_app/data/derived/refresh_comparison_details.csv
            deploy_app/manifest.json
          if-no-files-found: warn
