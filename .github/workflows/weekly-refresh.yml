name: Schertz weekly refresh and deploy

on:
  workflow_dispatch:
  schedule:
    - cron: "10 6 * * 0"
      timezone: "America/Chicago"

concurrency:
  group: schertz-weekly-refresh
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install Linux system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libpoppler-cpp-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c(
            "rsconnect",
            "httr2", "rvest", "xml2", "dplyr", "purrr", "readr",
            "stringr", "tibble", "tidyr", "lubridate", "pdftools",
            "jsonlite", "shiny", "bslib", "DT"
          ), repos = "https://cloud.r-project.org")'

      - name: Run weekly refresh
        env:
          SCHERTZ_START_YEAR: "2019"
          SCHERTZ_INCLUDE_ARCHIVE: "false"
        run: |
          Rscript scripts/update_data.R

      - name: Generate deployment manifest
        run: |
          Rscript -e 'rsconnect::writeManifest(
            appDir = "deploy_app",
            appFiles = c(
              "app.R",
              "R/00_config.R",
              "data/derived/documents.rds",
              "data/derived/refresh_metadata.csv"
            ),
            appMode = "shiny",
            appPrimaryDoc = "app.R"
          )'

      - name: Deploy refreshed app to shinyapps.io
        if: false
        env:
          SHINYAPPS_NAME: ${{ secrets.SHINYAPPS_NAME }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
          SHINY_APP_NAME: ${{ secrets.SHINY_APP_NAME }}
        run: |
          Rscript -e 'rsconnect::setAccountInfo(
            name = Sys.getenv("SHINYAPPS_NAME"),
            token = Sys.getenv("SHINYAPPS_TOKEN"),
            secret = Sys.getenv("SHINYAPPS_SECRET")
          )'
          Rscript -e 'app_name <- Sys.getenv("SHINY_APP_NAME", unset = ""); rsconnect::deployApp(
            appDir = "deploy_app",
            manifestPath = "deploy_app/manifest.json",
            appName = if (nzchar(app_name)) app_name else NULL,
            forceUpdate = TRUE
          )'

      - name: Upload refresh artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schertz-refresh-artifacts
          path: |
            deploy_app/data/derived/documents.rds
            deploy_app/data/derived/documents.csv
            deploy_app/data/derived/refresh_metadata.csv
            deploy_app/data/derived/refresh_comparison_summary.csv
            deploy_app/data/derived/refresh_comparison_details.csv
            deploy_app/manifest.json
          if-no-files-found: warn
