name: Schertz weekly refresh and deploy

on:
  workflow_dispatch:
  schedule:
    - cron: "10 6 * * 0"
      timezone: "America/Chicago"

concurrency:
  group: schertz-weekly-refresh
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install Linux system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libpoppler-cpp-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c(
            "rsconnect",
            "httr2", "rvest", "xml2", "dplyr", "purrr", "readr",
            "stringr", "tibble", "tidyr", "lubridate", "pdftools",
            "jsonlite"
          ), repos = "https://cloud.r-project.org")'

      - name: Run weekly refresh
        env:
          SCHERTZ_START_YEAR: "2019"
          SCHERTZ_INCLUDE_ARCHIVE: "false"
        run: |
          Rscript scripts/update_data.R

      - name: Deploy refreshed app to shinyapps.io
        env:
          SHINYAPPS_NAME: ${{ secrets.SHINYAPPS_NAME }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
          SHINY_APP_DIR: ${{ secrets.SHINY_APP_DIR }}
          SHINY_APP_NAME: ${{ secrets.SHINY_APP_NAME }}
        run: |
          Rscript -e 'rsconnect::setAccountInfo(
            name = Sys.getenv("SHINYAPPS_NAME"),
            token = Sys.getenv("SHINYAPPS_TOKEN"),
            secret = Sys.getenv("SHINYAPPS_SECRET")
          )'
          Rscript -e 'app_dir <- Sys.getenv("SHINY_APP_DIR", unset = "."); app_name <- Sys.getenv("SHINY_APP_NAME", unset = NULL); rsconnect::deployApp(appDir = app_dir, appName = app_name, forceUpdate = TRUE)'

      - name: Upload refresh artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schertz-refresh-artifacts
          path: |
            data/derived/documents.rds
            data/derived/documents.csv
            data/derived/refresh_metadata.csv
          if-no-files-found: warn
